<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>Urchin | المجرى المائي</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="auth-overlay">
        <div class="auth-3d-card">
            <div class="urchin-logo-3d">
                <i class="fa-solid fa-water"></i>
            </div>
            <h1 id="auth-title">انضم للمجرى</h1>
            <p id="auth-subtitle">سجل دخولك في Urchin 2026</p>

            <div class="auth-inputs">
                <div class="input-3d" id="username-group" style="display: none;">
                    <label>اسم المستخدم (رباعي حصراً)</label>
                    <input type="text" id="auth-username" placeholder="مثال: wano_1" maxlength="20">
                    <small id="user-hint">مسموح فقط: حروف صغيرة، أرقام، ( . _ - )</small>
                </div>

                <div class="input-3d">
                    <label>البريد الإلكتروني</label>
                    <input type="email" id="auth-email" placeholder="example@gmail.com">
                </div>

                <div class="input-3d">
                    <label>كلمة المرور</label>
                    <input type="password" id="auth-password" placeholder="••••••••">
                </div>

                <button class="btn-urch-primary" id="auth-submit-btn" onclick="processAuth()">دخول</button>
            </div>

            <div class="auth-switch">
                <span id="auth-toggle-text">ليس لديك حساب؟ <strong onclick="toggleAuthMode()">إنشاء حساب</strong></span>
            </div>
        </div>
    </div>

    <div id="app-screen" style="display: none;">
        
        <aside class="urchin-sidebar">
            <div class="brand-zone">
                <div class="brand-logo"><i class="fa-solid fa-water"></i></div>
            </div>

            <nav class="nav-icons">
                <div class="nav-item active" onclick="switchTab('dm')" title="الرسائل الخاصة">
                    <i class="fa-solid fa-comment-dots"></i>
                </div>
                <div class="nav-item" onclick="switchTab('chat')" title="المجتمع">
                    <i class="fa-solid fa-users-rectangle"></i>
                </div>
                <div class="nav-item store-icon" onclick="switchTab('store')" title="المتجر">
                    <i class="fa-solid fa-bag-shopping"></i>
                </div>
            </nav>

            <div class="bottom-zone">
                <div class="user-avatar-3d" onclick="openProfileSettings()">
                    <img src="https://i.imgur.com/vHqB3q0.png" id="myAvatar">
                    <div class="status-dot"></div>
                </div>
            </div>
        </aside>

        <main class="main-stage">
            
            <section id="view-store" class="content-view" style="display: none;">
                <header class="view-header">
                    <h2><i class="fa-solid fa-cart-shopping"></i> متجر Urchin</h2>
                    <div class="balance-display">
                        <span id="user-coins">0</span> <i class="fa-solid fa-coins"></i>
                    </div>
                </header>
                <div class="store-grid">
                    <div class="store-card">
                        <div class="theme-preview blue-theme"></div>
                        <h3>ثيم المحيط الأزرق</h3>
                        <p>السعر: 15 عملة</p>
                        <button onclick="buyItem('theme_blue')">شراء</button>
                    </div>
                </div>
            </section>

            <section id="view-chat" class="content-view">
                <header class="view-header">
                    <div class="header-left">
                        <button id="mobileMenu" class="mobile-only"><i class="fa-solid fa-bars"></i></button>
                        <h2># الدردشة_العامة</h2>
                    </div>
                </header>
                <div id="chat-messages" class="messages-container"></div>
                <footer class="chat-input-zone">
                    <div class="input-bar-3d">
                        <button class="plus-btn"><i class="fa-solid fa-circle-plus"></i></button>
                        <input type="text" id="messageInput" placeholder="اكتب شيئاً عظيماً...">
                        <button id="sendBtn" class="send-urchin"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </footer>
            </section>

            <section id="view-dm" class="content-view" style="display: none;">
                <header class="view-header">
                    <h2>الرسائل الخاصة</h2>
                </header>
                <div class="empty-state">
                    <i class="fa-solid fa-ghost"></i>
                    <p>لا توجد محادثات حالياً</p>
                </div>
            </section>

        </main>
    </div>

    <div id="settings-modal" class="modal">
        <div class="modal-content">
            <h3>تعديل الملف الشخصي</h3>
            <div class="profile-edit-zone">
                <img src="" id="edit-avatar-preview">
                <input type="text" id="edit-bio" placeholder="اكتب بايو جذاب...">
                <button onclick="saveProfileWithAI()">حفظ التغييرات</button>
                <button onclick="closeModal()" class="btn-close">إلغاء</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
