<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Discord - Urchin Official</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen">
        <div class="auth-box">
            <h1 id="auth-title">Welcome back!</h1>
            <p id="auth-subtitle">We're so excited to see you again!</p>
            
            <div class="input-group" id="username-group" style="display: none;">
                <label>Username</label>
                <input type="text" id="auth-username" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Email <span style="color: var(--danger);">*</span></label>
                <input type="email" id="auth-email" autocomplete="off">
            </div>
            
            <div class="input-group">
                <label>Password <span style="color: var(--danger);">*</span></label>
                <input type="password" id="auth-password">
            </div>
            
            <button class="btn-login" id="auth-submit-btn" onclick="processAuth()">Log In</button>
            <div class="auth-footer">
                <span id="auth-toggle-text">Need an account? <span class="toggle-link" onclick="toggleAuthMode()">Register</span></span>
            </div>
        </div>
    </div>

    <div id="app-screen" style="display: none;">
        
        <nav id="sidebar" class="sidebar">
            <div class="servers-list">
                <div class="server-icon active-server"><i class="fa-brands fa-discord"></i></div>
                <div class="server-icon"><i class="fa-solid fa-water"></i></div>
                <div class="server-icon" style="color: var(--success); background: #313338;"><i class="fa-solid fa-plus"></i></div>
            </div>
            
            <div class="channels-panel">
                <div class="server-header">
                    <span>Urchin Official</span>
                    <i class="fa-solid fa-chevron-down" style="font-size: 12px;"></i>
                </div>
                <div class="channels-list">
                    <div class="category-title"><i class="fa-solid fa-chevron-down" style="font-size: 10px; margin-right: 4px;"></i> TEXT CHANNELS</div>
                    <div class="channel-item active-channel"><i class="fa-solid fa-hashtag"></i> <span>general</span></div>
                    <div class="channel-item"><i class="fa-solid fa-hashtag"></i> <span>announcements</span></div>
                </div>
                
                <div class="user-controls">
                    <div class="user-info-bar">
                        <img src="https://i.imgur.com/vHqB3q0.png" alt="User" id="sidebarAvatar" class="sidebar-avatar">
                        <div class="user-name-role">
                            <strong id="sidebarUsername">User</strong>
                            <span id="sidebarRole">Online</span>
                        </div>
                    </div>
                    <div class="user-actions">
                        <button><i class="fa-solid fa-microphone-slash"></i></button>
                        <button><i class="fa-solid fa-headphones"></i></button>
                        <button onclick="handleLogout()" style="color: var(--danger);" title="Logout"><i class="fa-solid fa-right-from-bracket"></i></button>
                    </div>
                </div>
            </div>
        </nav>

        <main id="main-content" class="main-content">
            <header class="app-header">
                <div class="header-left" style="display: flex; align-items: center;">
                    <button id="mobileMenuBtn" class="hamburger-btn"><i class="fa-solid fa-bars"></i></button>
                    <div class="channel-info"><i class="fa-solid fa-hashtag"></i> <span>general</span></div>
                </div>
                <div class="header-right">
                    <i class="fa-solid fa-user-group" style="color: var(--interactive-normal); font-size: 18px; cursor: pointer;"></i>
                </div>
            </header>
            
            <section class="chat-area" id="chat-messages">
                </section>
            
            <footer class="input-area">
                <div class="input-wrapper">
                    <button class="action-btn"><i class="fa-solid fa-circle-plus"></i></button>
                    <input type="text" id="messageInput" placeholder="Message #general" autocomplete="off">
                    <button class="action-btn"><i class="fa-solid fa-gift"></i></button>
                    <button class="action-btn" id="sendBtn" style="color: var(--brand);"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </footer>
        </main>
    </div>

    <script>
        let isLoginMode = true;
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            document.getElementById('username-group').style.display = isLoginMode ? 'none' : 'block';
            document.getElementById('auth-submit-btn').innerText = isLoginMode ? 'Log In' : 'Continue';
            document.getElementById('auth-title').innerText = isLoginMode ? 'Welcome back!' : 'Create an account';
            document.getElementById('auth-subtitle').innerText = isLoginMode ? "We're so excited to see you again!" : "";
            document.getElementById('auth-toggle-text').innerHTML = isLoginMode ? 
                'Need an account? <span class="toggle-link" onclick="toggleAuthMode()">Register</span>' : 
                '<span class="toggle-link" onclick="toggleAuthMode()">Already have an account?</span>';
        }

        document.getElementById('mobileMenuBtn').onclick = function() {
            document.getElementById('sidebar').classList.toggle('active');
        };
    </script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getDatabase, ref, set, get, push, onChildAdded, serverTimestamp, query, limitToLast } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        // المفتاح الصحيح 100%
        const firebaseConfig = {
            apiKey: "AIzaSyBZc6wYIoRWErFDlspRMvd08ujx8vtgxPk",
            authDomain: "wano-studio.firebaseapp.com",
            databaseURL: "https://wano-studio-default-rtdb.firebaseio.com",
            projectId: "wano-studio",
            storageBucket: "wano-studio.firebasestorage.app",
            messagingSenderId: "464709722674",
            appId: "1:464709722674:web:5393cdd4c00c033014122b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUser = null;
        let userData = null;

        window.handleSignup = async (email, password, username) => {
            try {
                const cred = await createUserWithEmailAndPassword(auth, email, password);
                
                // تحديد رتبة الأونر (roleId = 1)
                userData = {
                    uid: cred.user.uid,
                    email: email,
                    username: username,
                    roleId: 1, 
                    badges: ["badge-owner", "badge-admin"],
                    joinedAt: serverTimestamp()
                };
                await set(ref(db, `users/${cred.user.uid}`), userData);
                alert("تم إنشاء حسابك بنجاح!");
            } catch (error) {
                alert("خطأ: " + error.message);
            }
        };

        window.handleLogin = async (email, password) => {
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                alert("الإيميل أو الباسوورد غير صحيح!");
            }
        };

        window.handleLogout = () => signOut(auth).then(() => window.location.reload());

        window.processAuth = () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const username = document.getElementById('auth-username').value;
            if (!email || !password) return alert("املأ جميع الحقول");
            isLoginMode ? handleLogin(email, password) : handleSignup(email, password, username);
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const snap = await get(ref(db, `users/${user.uid}`));
                userData = snap.val() || { username: "User", roleId: 0, badges: [] };
                
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('app-screen').style.display = 'flex';
                document.getElementById('sidebarUsername').innerText = userData.username;
                
                initChatSystem();
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('app-screen').style.display = 'none';
            }
        });

        function initChatSystem() {
            const input = document.getElementById('messageInput');
            const sendBtn = document.getElementById('sendBtn');
            
            const sendMsg = () => {
                const text = input.value.trim();
                if (text) {
                    push(ref(db, 'channels/general/messages'), {
                        uid: userData.uid,
                        username: userData.username,
                        roleId: userData.roleId,
                        text: text,
                        timestamp: Date.now()
                    });
                    input.value = "";
                }
            };
            
            sendBtn.onclick = sendMsg;
            input.onkeypress = (e) => { if(e.key === 'Enter') sendMsg(); };

            // استرجاع وعرض الرسائل (بستايل ديسكورد)
            onChildAdded(query(ref(db, 'channels/general/messages'), limitToLast(100)), (data) => {
                const m = data.val();
                const div = document.createElement('div');
                div.className = 'message';
                
                // تمييز الأونر (roleId == 1)
                const nameColor = m.roleId === 1 ? 'color: #f1c40f;' : 'color: var(--text-normal);';
                
                // نظام البادجات
                let badgesHTML = '';
                if(m.roleId === 1) {
                    badgesHTML = `<span class="badge badge-owner" title="Owner"><i class="fa-solid fa-crown"></i></span>`;
                }

                // الوقت
                const timeStr = new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

                div.innerHTML = `
                    <img src="https://i.imgur.com/vHqB3q0.png" class="msg-avatar">
                    <div class="msg-content">
                        <div class="msg-header">
                            <span class="msg-username" style="${nameColor}">${m.username}</span>
                            ${badgesHTML}
                            <span class="msg-time">Today at ${timeStr}</span>
                        </div>
                        <div class="msg-text">${m.text}</div>
                    </div>
                `;
                document.getElementById('chat-messages').appendChild(div);
                document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
            });
        }
    </script>
</body>
</html>
