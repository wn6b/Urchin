<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Urchin - Social Platform</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="loading-screen" class="active">
        <div class="loader"></div>
        <p>Connecting to servers...</p>
    </div>

    <div id="auth-screen" class="hidden auth-container">
        <div class="auth-box">
            <div class="logo-container">
                <svg width="48" height="48" viewBox="0 0 64 64" fill="none" style="color: var(--accent);">
                    <circle cx="32" cy="32" r="14" fill="currentColor" />
                    <line x1="48" y1="32" x2="62" y2="32" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                    <line x1="16" y1="32" x2="2" y2="32" stroke="currentColor" stroke-width="3" stroke-linecap="round"/>
                    <circle cx="32" cy="32" r="6" fill="var(--bg)" />
                </svg>
                <h2>Urchin</h2>
            </div>
            <input type="email" id="auth-email" placeholder="Email Address">
            <input type="password" id="auth-password" placeholder="Password">
            <button id="btn-login" class="btn-primary">Login</button>
            <button id="btn-register" class="btn-secondary">Create Account</button>
            <p id="auth-error" class="error-msg"></p>
        </div>
    </div>

    <div id="app-screen" class="hidden app-layout">
        
        <header class="top-bar">
            <div class="brand">
                <svg width="36" height="36" viewBox="0 0 64 64" fill="none" style="color: var(--accent);">
                    <circle cx="32" cy="32" r="14" fill="currentColor" />
                    <circle cx="32" cy="32" r="6" fill="var(--bg)" />
                </svg>
                <div class="brand-text">
                    <div class="title">Urchin</div>
                    <div class="copyright" id="header-copyright">© Loading...</div>
                </div>
            </div>
            <div class="top-actions">
                <button id="btn-new-post" class="btn-primary btn-sm"><span class="icon">+</span> Post</button>
                <div id="my-profile-btn" class="avatar-clickable">
                    <img id="my-avatar-top" src="" alt="Me" class="avatar avatar-sm">
                    <div class="status-indicator online"></div>
                </div>
            </div>
        </header>

        <main class="main-content">
            
            <section id="view-home" class="view active fade-in">
                <div class="stories-container" id="stories-list">
                    </div>
                <div id="posts-feed" class="feed-container">
                    </div>
            </section>

            <section id="view-dms" class="view hidden fade-in split-view">
                <div class="sidebar-list" id="dm-users-list">
                    <div class="sidebar-title">Direct Messages</div>
                    </div>
                <div class="chat-area" id="dm-chat-area">
                    <div class="empty-state">Select a conversation</div>
                </div>
            </section>

            <section id="view-servers" class="view hidden fade-in split-view">
                <div class="server-icons-list" id="server-icons">
                    <div class="server-icon create-server-btn" id="btn-show-create-server">+</div>
                </div>
                <div class="channels-list" id="channels-list">
                    <div class="sidebar-title" id="current-server-name">Select Server</div>
                    <div id="categories-container"></div>
                </div>
                <div class="chat-area" id="server-chat-area">
                    <div class="chat-header">
                        <span id="current-channel-name"># Welcome</span>
                        <button id="btn-fullscreen-chat" class="icon-btn" title="Fullscreen Chat">⛶</button>
                    </div>
                    <div class="chat-messages" id="server-messages"></div>
                    <div class="chat-controls">
                        <button id="btn-join-voice" class="btn-voice hidden">🎤 Join Voice</button>
                        <button id="btn-toggle-mic" class="btn-voice hidden">🔇 Mute</button>
                        <input type="text" id="server-msg-input" placeholder="Message...">
                        <button id="btn-send-server-msg" class="btn-primary">Send</button>
                    </div>
                </div>
            </section>

            <section id="view-settings" class="view hidden fade-in">
                <div class="settings-container">
                    <div class="profile-card">
                        <div class="banner"></div>
                        <div class="profile-info">
                            <div class="avatar-wrapper">
                                <img id="settings-avatar" src="" class="avatar avatar-lg">
                                <button class="btn-edit-avatar" id="btn-trigger-file">📷</button>
                                <input type="file" id="file-avatar-upload" accept="image/*" hidden>
                            </div>
                            <h2 id="settings-name-display">Loading...</h2>
                            <p class="username" id="settings-username-display">@loading</p>
                            <p class="bio" id="settings-bio-display"></p>
                        </div>
                    </div>

                    <div class="edit-form card">
                        <h3>Edit Profile</h3>
                        <label>Display Name</label>
                        <input type="text" id="edit-name">
                        <label>Username (Max 4 chars, 3 for Owner) - Change every 42h</label>
                        <div class="input-with-icon">
                            <span>@</span>
                            <input type="text" id="edit-username" maxlength="4">
                        </div>
                        <label>Bio</label>
                        <textarea id="edit-bio" rows="3"></textarea>
                        <button id="btn-save-profile" class="btn-primary">Save Changes</button>
                    </div>
                    
                    <button id="btn-logout" class="btn-danger full-width" style="margin-top: 15px;">Logout</button>
                </div>
            </section>

            <section id="view-owner" class="view hidden fade-in">
                <div class="settings-container">
                    <h2 style="color: var(--danger);">👑 Owner Panel</h2>
                    
                    <div class="card">
                        <h3>Reserve 3-Letter Username</h3>
                        <input type="text" id="owner-special-username" placeholder="e.g. a1b" maxlength="3">
                        <button id="btn-reserve-user" class="btn-primary">Reserve Username</button>
                    </div>

                    <div class="card" style="margin-top: 20px;">
                        <h3>Create Official Bot</h3>
                        <input type="text" id="bot-name" placeholder="Bot Name">
                        <textarea id="bot-bio" placeholder="Bot Bio" rows="2"></textarea>
                        <label>Bot Avatar</label>
                        <input type="file" id="bot-avatar-file" accept="image/*">
                        <button id="btn-create-bot" class="btn-primary" style="margin-top: 10px;">Create Bot</button>
                        <div id="bot-list-container" style="margin-top: 15px;"></div>
                    </div>
                </div>
            </section>

        </main>

        <nav class="bottom-nav">
            <button class="nav-item active" data-target="view-home">
                <span class="icon">🏠</span> Home
            </button>
            <button class="nav-item" data-target="view-dms">
                <span class="icon">💬</span> Messages
            </button>
            <button class="nav-item" data-target="view-servers">
                <span class="icon">🎮</span> Servers
            </button>
            <button class="nav-item" data-target="view-settings">
                <span class="icon">⚙️</span> Settings
            </button>
            <button class="nav-item hidden" id="nav-owner" data-target="view-owner" style="color: var(--danger);">
                <span class="icon">👑</span> Owner
            </button>
        </nav>
    </div>

    <div id="modal-overlay" class="hidden">
        <div id="modal-profile" class="modal hidden">
            <button class="btn-close-modal">✕</button>
            <div class="modal-content profile-modal-content">
                <img id="view-user-avatar" src="" class="avatar avatar-xl">
                <h2 id="view-user-name"></h2>
                <p class="username" id="view-user-username"></p>
                <p id="view-user-bio"></p>
                <div class="stats-row">
                    <div><span id="view-user-lastlogin"></span><br><small>Last Login</small></div>
                </div>
                <button id="btn-dm-user" class="btn-primary full-width mt-10">Send Message</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
