<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Urchin - Mobile App</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div id="mobile-frame">

    <div id="loading-screen" class="screen flex-center col">
      <div class="spinner"></div>
      <h1 class="logo-text">Urchin</h1>
      <p class="sub-text">Social Platform</p>
    </div>

    <div id="auth-screen" class="screen hidden">
      </div>

    <div id="app-screen" class="screen hidden flex-col">
      <header id="top-bar" class="top-bar flex-row items-center justify-between"></header>

      <main id="main-content" class="flex-1 overflow-y relative"></main>

      <nav id="bottom-nav" class="bottom-bar flex-row justify-around"></nav>
    </div>

    <div id="modal-overlay" class="modal-overlay hidden flex-center">
      <div id="modal-content" class="modal-box"></div>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
