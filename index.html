<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <title>Urchin | 2026 Edition</title>

    <link rel="manifest" href="manifest.json">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="auth-screen" class="active-screen">
        <div class="urchin-logo-container">
            <i class="fa-solid fa-water"></i>
        </div>
        
        <div class="auth-box">
            <h1>Urchin</h1>
            <p id="auth-subtitle">Welcome Back!</p>
            
            <div class="auth-form">
                <div class="input-group" id="username-group" style="display: none;">
                    <i class="fa-solid fa-user"></i>
                    <input type="text" id="auth-username" placeholder="Username (Min 4 chars)">
                </div>

                <div class="input-group">
                    <i class="fa-solid fa-envelope"></i>
                    <input type="email" id="auth-email" placeholder="Email Address">
                </div>
                
                <div class="input-group">
                    <i class="fa-solid fa-lock"></i>
                    <input type="password" id="auth-password" placeholder="Password (Min 6 chars)">
                </div>

                <button class="btn-login" id="auth-submit-btn" onclick="processAuth()">
                    Login
                </button>
            </div>
            
            <div class="auth-footer">
                <p id="auth-toggle-text">Need an account? <span onclick="toggleAuthMode()" class="toggle-link" style="color: var(--primary-accent); cursor: pointer; font-weight: bold;">Register</span></p>
            </div>
        </div>
    </div>

    <div id="app-screen" style="display: none;">

        <nav id="sidebar" class="sidebar">
            <div class="servers-list">
                <div class="server-icon active-server"><i class="fa-solid fa-water"></i></div>
                <div class="server-icon add-server"><i class="fa-solid fa-plus"></i></div>
            </div>

            <div class="channels-panel">
                <div class="server-header">
                    <h2>Urchin Official</h2>
                    <i class="fa-solid fa-chevron-down"></i>
                </div>
                
                <div class="channels-list">
                    <div class="category-title"><i class="fa-solid fa-angle-down"></i> TEXT CHANNELS</div>
                    <div class="channel-item active-channel"><i class="fa-solid fa-hashtag"></i> <span>general</span></div>
                    <div class="channel-item"><i class="fa-solid fa-hashtag"></i> <span>announcements</span></div>
                </div>

                <div class="user-controls">
                    <div class="user-info-bar">
                        <div class="avatar-wrapper">
                            <img src="https://via.placeholder.com/150" alt="User" id="sidebarAvatar" class="sidebar-avatar">
                            <div class="status-indicator online"></div>
                        </div>
                        <div class="user-name-role">
                            <strong id="sidebarUsername">User</strong>
                            <span id="sidebarRole">#0000</span>
                        </div>
                    </div>
                    <div class="user-actions">
                        <button aria-label="Settings" onclick="toggleSettings()"><i class="fa-solid fa-gear"></i></button>
                        <button aria-label="Logout" onclick="window.handleLogout()" style="color: var(--danger);"><i class="fa-solid fa-right-from-bracket"></i></button>
                    </div>
                </div>
            </div>
        </nav>

        <main id="main-content" class="main-content">
            <header class="app-header">
                <div class="header-left">
                    <button id="mobileMenuBtn" class="hamburger-btn" style="background:none; border:none; color:white; font-size:20px; margin-right:10px;"><i class="fa-solid fa-bars"></i></button>
                    <div class="channel-info"><i class="fa-solid fa-hashtag"></i> <span>general</span></div>
                </div>
                <div class="header-right">
                    <div class="user-profile-mini">
                        <img src="https://via.placeholder.com/150" alt="Avatar" class="user-avatar" id="currentUserAvatar">
                    </div>
                </div>
            </header>

            <section class="chat-area" id="chat-messages">
                </section>

            <footer class="input-area">
                <div class="input-wrapper">
                    <button class="action-btn attach-btn"><i class="fa-solid fa-circle-plus"></i></button>
                    <input type="text" id="messageInput" placeholder="Message #general..." autocomplete="off">
                    <button class="send-btn" id="sendBtn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </footer>
        </main>
    </div>

    <script>
        let isLoginMode = true;

        // تبديل واجهة الدخول/التسجيل
        function toggleAuthMode() {
            isLoginMode = !isLoginMode;
            const usernameGroup = document.getElementById('username-group');
            const submitBtn = document.getElementById('auth-submit-btn');
            const toggleText = document.getElementById('auth-toggle-text');
            const subtitle = document.getElementById('auth-subtitle');

            if (isLoginMode) {
                usernameGroup.style.display = 'none';
                submitBtn.innerText = 'Login';
                subtitle.innerText = 'Welcome Back!';
                toggleText.innerHTML = 'Need an account? <span onclick="toggleAuthMode()" class="toggle-link" style="color: var(--primary-accent); cursor: pointer; font-weight: bold;">Register</span>';
            } else {
                usernameGroup.style.display = 'flex';
                submitBtn.innerText = 'Create Account';
                subtitle.innerText = 'Join Urchin Today!';
                toggleText.innerHTML = 'Already have an account? <span onclick="toggleAuthMode()" class="toggle-link" style="color: var(--primary-accent); cursor: pointer; font-weight: bold;">Login</span>';
            }
        }

        // معالجة الضغط على الزر
        function processAuth() {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const username = document.getElementById('auth-username').value;

            if (!email || !password) {
                alert("Please fill in all fields!");
                return;
            }

            if (isLoginMode) {
                window.handleLogin(email, password);
            } else {
                if (!username) { alert("Username is required!"); return; }
                window.handleSignup(email, password, username);
            }
        }

        // تفعيل القائمة الجانبية للموبايل
        document.getElementById('mobileMenuBtn').onclick = function() {
            document.getElementById('sidebar').classList.toggle('active');
        };
    </script>

    <script type="module" src="script.js"></script>
</body>
</html>
