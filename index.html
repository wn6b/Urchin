<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Urchin - The Future of Communication</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* Urchin Core CSS - 2026 Advanced Mobile UI 
           Optimized for high performance on all devices
        */
        :root {
            --bg-color: #0a0a0f;
            --glass-bg: rgba(20, 20, 30, 0.6);
            --glass-border: rgba(255, 255, 255, 0.08);
            --primary-accent: #00d2ff; /* Urchin Electric Blue */
            --secondary-accent: #3a7bd5;
            --text-main: #ffffff;
            --text-muted: #8e8e93;
            --danger: #ff3b30;
            --success: #34c759;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at top right, rgba(0, 210, 255, 0.1), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(58, 123, 213, 0.1), transparent 40%);
            color: var(--text-main);
            font-family: var(--font-family);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Auth Screen (Login) --- */
        #auth-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: var(--bg-color);
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        .urchin-logo-container {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, var(--primary-accent), var(--secondary-accent));
            border-radius: 30%;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.4);
            margin-bottom: 30px;
            animation: float 3s ease-in-out infinite;
        }

        .urchin-logo-container i {
            font-size: 60px;
            color: white;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .auth-box {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .auth-box h1 {
            font-size: 28px;
            margin-bottom: 10px;
            background: -webkit-linear-gradient(var(--primary-accent), var(--secondary-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .auth-box p {
            color: var(--text-muted);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .btn-login {
            background: linear-gradient(90deg, var(--primary-accent), var(--secondary-accent));
            border: none;
            border-radius: 12px;
            color: white;
            padding: 15px 20px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            transition: transform 0.2s;
        }

        .btn-login:active {
            transform: scale(0.95);
        }

        /* --- Main App UI (Hidden by default) --- */
        #app-screen {
            display: none; /* Will be flex via JS */
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        /* App Header */
        .app-header {
            height: 60px;
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 15px;
            z-index: 10;
        }

        .channel-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: bold;
            font-size: 18px;
        }

        .channel-info i {
            color: var(--text-muted);
        }

        .user-profile-mini {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .user-avatar {
            width: 35px;
            height: 35px;
            border-radius: 50%;
            background: #444;
            object-fit: cover;
            border: 2px solid var(--primary-accent);
        }

        /* Chat Area */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            scroll-behavior: smooth;
        }

        /* Hide scrollbar for clean mobile look */
        .chat-area::-webkit-scrollbar {
            display: none;
        }

        /* Message Bubble Design */
        .message {
            display: flex;
            gap: 12px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .msg-content {
            display: flex;
            flex-direction: column;
            max-width: 85%;
        }

        .msg-header {
            display: flex;
            align-items: baseline;
            gap: 8px;
            margin-bottom: 4px;
        }

        .msg-username {
            font-weight: bold;
            font-size: 15px;
            color: var(--text-main);
        }

        /* Badges Styling */
        .badges-container {
            display: flex;
            gap: 4px;
        }

        .badge {
            width: 16px;
            height: 16px;
            border-radius: 4px;
            display: inline-flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
        }

        .badge-admin { background: #ff3b30; color: white; box-shadow: 0 0 5px #ff3b30; }
        .badge-1 { background: gold; color: black; font-weight: bold;}
        .badge-2 { background: silver; color: black; font-weight: bold;}
        .badge-3 { background: #cd7f32; color: white; font-weight: bold;}
        .badge-nitro { background: #ff73fa; color: white; }

        .msg-time {
            font-size: 11px;
            color: var(--text-muted);
        }

        .msg-text {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 10px 14px;
            border-radius: 0 16px 16px 16px;
            font-size: 15px;
            line-height: 1.4;
            word-wrap: break-word;
        }

        /* Input Area */
        .input-area {
            padding: 10px 15px 20px 15px; /* Extra bottom padding for mobile safe area */
            background: var(--bg-color);
            border-top: 1px solid var(--glass-border);
        }

        .input-wrapper {
            display: flex;
            align-items: center;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 5px 15px;
            gap: 10px;
        }

        .input-wrapper input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 16px;
            padding: 10px 0;
            outline: none;
            font-family: var(--font-family);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .action-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 20px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .action-btn:hover, .action-btn:active {
            color: var(--primary-accent);
        }

        .send-btn {
            background: var(--primary-accent);
            color: #000;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: none;
            font-size: 14px;
        }

    </style>
</head>
<body>

    <div id="auth-screen">
        <div class="urchin-logo-container">
            <i class="fa-solid fa-water"></i> </div>
        <div class="auth-box">
            <h1>Urchin</h1>
            <p id="auth-subtitle">Connect. Beyond Limits.</p>
            <button class="btn-login" onclick="startLogin()">
                <i class="fa-brands fa-google"></i> Login to Urchin
            </button>
        </div>
    </div>

    <div id="app-screen">
        <header class="app-header">
            <div class="channel-info">
                <i class="fa-solid fa-hashtag"></i>
                <span>general</span>
            </div>
            <div class="user-profile-mini" onclick="openProfileSettings()">
                <img src="https://via.placeholder.com/150" alt="Avatar" class="user-avatar" id="currentUserAvatar">
            </div>
        </header>

        <div class="chat-area" id="chat-messages">
            </div>

        <div class="input-area">
            <div class="input-wrapper">
                <button class="action-btn"><i class="fa-solid fa-plus-circle"></i></button>
                <input type="text" id="messageInput" placeholder="Message #general...">
                <button class="send-btn" onclick="sendMessage()"><i class="fa-solid fa-paper-plane"></i></button>
            </div>
        </div>
    </div>

    <script type="module">
        // Placeholder for Part 2 (Firebase, Logic, Badges, Nitro System)
        console.log("Urchin UI Loaded successfully.");
    </script>
</body>
</html>
